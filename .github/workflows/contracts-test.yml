name: contracts-test

# Runs the Hardhat unit tests for the production contracts in ./contracts.
# These assert the money paths the protocol rests on — the bonding-curve math,
# the 2% levy, the full DAO governance lifecycle, the StepNet activation +
# daily-reward distribution, subscriptions, the NFT treasury sale, and the
# loyalty club — so a green check here actually means something.

on:
  push:
    paths:
      - "contracts/**"
      - "contracts-src/**"
      - "contracts-test/**"
      - ".github/workflows/contracts-test.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "contracts-src/**"
      - "contracts-test/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts-test/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hardhat compiles ./contracts. Assemble it from the production sources at
      # the repo root (../contracts) plus the test-only mocks
      # (../contracts-src/mocks). Generated at CI time, never committed.
      - name: Assemble sources
        run: |
          mkdir -p contracts
          cp ../contracts/*.sol contracts/
          cp -r ../contracts-src/mocks contracts/mocks

      - name: Run contract tests
        run: npx hardhat test
